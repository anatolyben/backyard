services:
  postgres:
    image: postgres:15
    container_name: backyard-postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=backyard
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    mem_limit: 512m
    cpus: "0.5"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: backyard-redis
    volumes:
      - redis_data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD}
    mem_limit: 128m
    cpus: "0.25"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  telegram-bot:
    build:
      context: .
      dockerfile: apps/telegram-bot/Dockerfile
    image: backyard-telegram-bot:latest
    container_name: backyard-telegram-bot
    env_file: .env
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - PGHOST=postgres
      - PGPORT=5432
      - PGDATABASE=backyard
      - PGUSER=postgres
      - PGPASSWORD=${POSTGRES_PASSWORD}
    mem_limit: 256m
    cpus: "0.5"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
